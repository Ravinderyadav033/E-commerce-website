<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h2>MyShop</h2>
    <a href="/">🏠 Home</a>
</div>

<h1 class="title">Your Cart</h1>

<div class="products">
    {% for item in items %}
    <div class="card">
        <img src="{{ item[3] }}">

        <h3>{{ item[1] }}</h3>
        <p class="price">₹{{ item[2] }}</p>

        <a class="remove-btn" href="/remove_from_cart/{{ item[0] }}">
            ❌ Remove
        </a>
    </div>
    {% endfor %}
</div>

<h2 class="total">Total: ₹{{ total }}</h2>

<div class="center">
    <a class="btn" href="/checkout" onclick="return confirmCheckout()">
        Checkout
    </a>
</div>

<script src="/static/script.js"></script>

</body>
</html>
